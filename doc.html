<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="function1()">Click Me</button>
    <p id="button"></p>

    <p id="mouseover" style="color: aqua;" onmouseover="function2()">MOuse over</p>
    <p id="mouseout" style="color: red;" onmouseout="function3()">Mouse out</p>

    <p id="keydown" style="color: green;" onkeydown="function4()"><input type="text" placeholder="Press a key"></p>
    <p id="keyup" style="color: blue;" onkeyup="function5()"><input type="text"></p>
    <p id="submit" style="color: purple;" onsubmit="function6()">Form submitted</p>
    <p id="change" style="color: orange;" onchange="function7()">Value changed</p>
    <p id="focus" style="color: brown;" onfocus="function8()">Input focused</p>
    <p id="blur" style="color: gray;" onblur="function9()">Input blurred</p>
    <p id="load" style="color: black;" onload="function10()">Page loaded</p>

    <script src="Events.js"></script>
</body>
</html>
